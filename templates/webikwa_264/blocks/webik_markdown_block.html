{% load wagtailimages_tags %}
{% load wagtailmarkdown %}

<div{% if self.applyclass %} class="{{ self.applyclass }}"{% endif %}{% if self.applystyle %} style="{{ self.applystyle }}"{% endif %}> 
  {{ self.markdown|markdown }}
</div>
{% else %}
  {{ self.markdown|markdown }}
{% endif %}
